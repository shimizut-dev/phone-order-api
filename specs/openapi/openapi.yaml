openapi: 3.0.3
info:
  title: phone-order-api
  version: 0.0.1-SNAPSHOT
  description: |
    移動機注文 API の外部仕様です。
    OpenAPI を API 仕様の正本として管理し、Swagger UI、モックサーバー、
    openapi-generator に利用します。

    ## 設計方針

    - REST を基本とし、JSON を利用します。
    - 外部公開パスは `/api/v1` を先頭に付与します。
    - リソース名は英小文字の複数形を基本とし、末尾スラッシュは付与しません。
    - JSON キーは `camelCase` とします。
    - 日時はタイムゾーンオフセット付き ISO 8601 形式の文字列で扱います。
    - 注文の外部公開識別子は `orderCode` とし、`ORD` + 6桁の連番で表現します。

    ## エラーレスポンス方針

    エラー時は共通の `ErrorResponse` を返します。
    バリデーションエラーがある場合は `validationErrors` にフィールド単位の `ValidationError` を返し、
    該当する明細がない場合は空配列を返します。

tags:
  - name: Orders
    description: 注文 API

servers:
  - url: http://localhost:8080
    description: local application server
  - url: http://localhost:4010
    description: local mock server
  - url: https://example.github.io/phone-order-api/mock
    description: published mock server example

paths:
  /api/v1/orders:
    get:
      tags:
        - Orders
      summary: 注文一覧を取得する
      description: |
        登録済みの注文一覧を取得します。
        注文日時の降順、同一日時の場合は注文コードの降順で返します。
        総ページ数を超える page を指定した場合は、空の items と指定ページのページ情報を返します。
      operationId: getOrders
      security:
        - basicAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 注文一覧取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPageResponse'
              example:
                items:
                  - orderCode: ORD000002
                    orderedAt: '2026-04-07T11:00:00+09:00'
                    orderStatus: '002'
                    version: 1
                  - orderCode: ORD000001
                    orderedAt: '2026-04-07T10:15:30+09:00'
                    orderStatus: '001'
                    version: 0
                page: 0
                size: 20
                totalElements: 2
                totalPages: 1
                hasNext: false
                hasPrevious: false
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Orders
      summary: 注文を登録する
      description: 注文日時を指定して注文を登録します。作成された注文は受付状態で返却します。
      operationId: createOrder
      security:
        - basicAuth: [ ]
      requestBody:
        x-codegen-request-body-name: createOrderRequest
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          description: 注文登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                orderCode: ORD000001
                orderedAt: '2026-04-07T10:15:30+09:00'
                orderStatus: '001'
                version: 0
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/orders/{orderCode}:
    get:
      tags:
        - Orders
      summary: 注文を取得する
      description: 注文コードを指定して注文を取得します。
      operationId: getOrderByOrderCode
      security:
        - basicAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/OrderCode'
      responses:
        '200':
          description: 注文取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                orderCode: ORD000001
                orderedAt: '2026-04-07T10:15:30+09:00'
                orderStatus: '001'
                version: 0
        '400':
          $ref: '#/components/responses/InvalidOrderCodeError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/orders/{orderCode}/cancel:
    post:
      tags:
        - Orders
      summary: 注文をキャンセルする
      description: 注文コードを指定して注文をキャンセル状態に更新します。
      operationId: cancelOrder
      security:
        - basicAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/OrderCode'
      requestBody:
        x-codegen-request-body-name: cancelOrderRequest
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
      responses:
        '200':
          description: 注文キャンセル成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                orderCode: ORD000001
                orderedAt: '2026-04-07T10:15:30+09:00'
                orderStatus: '006'
                version: 1
        '400':
          $ref: '#/components/responses/InvalidOrderCodeError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  parameters:
    OrderCode:
      name: orderCode
      in: path
      required: true
      description: 注文コード。`ORD` + 6桁の連番。
      schema:
        type: string
        pattern: '^ORD\d{6}$'
        minLength: 9
        maxLength: 9
        example: ORD000001
    Page:
      name: page
      in: query
      required: false
      description: 取得ページ番号。0 始まり。省略時は 0。
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
        example: 0
    Size:
      name: size
      in: query
      required: false
      description: 1ページあたりの取得件数。1 から 100 まで指定できます。省略時は 20。
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20
        example: 20

  responses:
    BadRequestError:
      description: |
        リクエスト形式不正または入力値不正。
        JSON 形式不正の場合は message に `リクエストボディの形式が不正です。` を返し、
        validationErrors は空配列を返します。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-04-07T10:15:30+09:00'
            status: 400
            error: BAD_REQUEST
            message: 入力値が不正です。
            path: /api/v1/orders
            validationErrors:
              - field: orderedAt
                message: 必須項目です。
    InvalidOrderCodeError:
      description: 注文コード形式不正
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-04-07T10:15:30+09:00'
            status: 400
            error: BAD_REQUEST
            message: 入力値が不正です。
            path: /api/v1/orders/INVALID
            validationErrors:
              - field: getOrderByOrderCode.orderCode
                message: must match "^ORD\d{6}$"
    UnauthorizedError:
      description: 認証エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-04-07T10:15:30+09:00'
            status: 401
            error: UNAUTHORIZED
            message: 認証が必要です。
            path: /api/v1/orders
            validationErrors:
              - field: auth
                message: 認証が必要です。
    ForbiddenError:
      description: 認可エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-04-07T10:15:30+09:00'
            status: 403
            error: FORBIDDEN
            message: アクセスが拒否されました。
            path: /api/v1/admin
            validationErrors:
              - field: auth
                message: アクセスが拒否されました。
    NotFoundError:
      description: 指定された注文が存在しない
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-04-07T10:15:30+09:00'
            status: 404
            error: NOT_FOUND
            message: 注文が見つかりません。
            path: /api/v1/orders/ORD999999
            validationErrors: [ ]
    ConflictError:
      description: 業務ルール違反または状態不整合
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-04-07T10:15:30+09:00'
            status: 409
            error: CONFLICT
            message: 注文をキャンセルできません。
            path: /api/v1/orders/ORD000001/cancel
            validationErrors: [ ]
    InternalServerError:
      description: 想定外エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-04-07T10:15:30+09:00'
            status: 500
            error: INTERNAL_SERVER_ERROR
            message: サーバー内部でエラーが発生しました。
            path: /api/v1/orders
            validationErrors: [ ]

  schemas:
    OrderRequest:
      type: object
      description: 注文登録リクエスト。
      required:
        - orderedAt
      properties:
        orderedAt:
          type: string
          format: date-time
          description: 注文日時。タイムゾーンオフセット付き ISO 8601 形式。
          example: '2026-04-07T10:15:30+09:00'

    CancelOrderRequest:
      type: object
      description: 注文キャンセルリクエスト。
      required:
        - version
      properties:
        version:
          type: integer
          format: int64
          minimum: 0
          description: 注文バージョン。楽観的ロックに使用します。
          example: 0

    OrderResponse:
      type: object
      description: 注文レスポンス。
      required:
        - orderCode
        - orderedAt
        - orderStatus
        - version
      properties:
        orderCode:
          type: string
          description: 注文コード。`ORD` + 6桁の連番。
          pattern: '^ORD\d{6}$'
          example: ORD000001
        orderedAt:
          type: string
          format: date-time
          description: 注文日時。タイムゾーンオフセット付き ISO 8601 形式。
          example: '2026-04-07T10:15:30+09:00'
        orderStatus:
          type: string
          description: |
            注文ステータスコード。

            - `001`: 受付
            - `002`: 審査中
            - `003`: 手配中
            - `004`: 出荷待ち
            - `005`: 完了
            - `006`: キャンセル
          enum:
            - '001'
            - '002'
            - '003'
            - '004'
            - '005'
            - '006'
          example: '001'
        version:
          type: integer
          format: int64
          minimum: 0
          description: 注文バージョン。楽観的ロックに使用します。
          example: 0

    OrderPageResponse:
      type: object
      description: ページング済み注文一覧レスポンス。
      required:
        - items
        - page
        - size
        - totalElements
        - totalPages
        - hasNext
        - hasPrevious
      properties:
        items:
          type: array
          description: 取得した注文一覧。
          items:
            $ref: '#/components/schemas/OrderResponse'
        page:
          type: integer
          format: int32
          minimum: 0
          description: 取得ページ番号。0 始まり。
          example: 0
        size:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          description: 1ページあたりの取得件数。
          example: 20
        totalElements:
          type: integer
          format: int64
          minimum: 0
          description: 条件に一致する総件数。
          example: 123
        totalPages:
          type: integer
          format: int32
          minimum: 0
          description: 総件数とページサイズから算出した総ページ数。
          example: 7
        hasNext:
          type: boolean
          description: 次ページが存在する場合は true。
          example: true
        hasPrevious:
          type: boolean
          description: 前ページが存在する場合は true。
          example: false

    ErrorResponse:
      type: object
      description: 共通エラーレスポンス。
      required:
        - timestamp
        - status
        - error
        - message
        - path
        - validationErrors
      properties:
        timestamp:
          type: string
          format: date-time
          description: エラー発生日時。
          example: '2026-04-07T10:15:30+09:00'
        status:
          type: integer
          format: int32
          description: HTTP ステータスコード。
          example: 404
        error:
          type: string
          description: HTTPステータスに対応するエラーコード。標準ステータスは BAD_REQUEST などの定義済みコード、非標準ステータスは HTTP_<statusCode> を返す。
          example: NOT_FOUND
        message:
          type: string
          description: 利用者向けメッセージ。
          example: 注文が見つかりません。
        path:
          type: string
          description: リクエストパス。
          example: /api/v1/orders/ORD999999
        validationErrors:
          type: array
          description: バリデーションエラー一覧。該当なしの場合は空配列。
          items:
            $ref: '#/components/schemas/ValidationError'
          example: [ ]

    ValidationError:
      type: object
      description: フィールド単位のバリデーションエラー。
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: エラー対象項目。
          example: orderedAt
        message:
          type: string
          description: エラー内容。
          example: 必須項目です。
