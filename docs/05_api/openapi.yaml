openapi: 3.0.3
info:
  title: phone-order-api
  version: 0.0.1-SNAPSHOT
  description: |
    携帯電話注文 API の外部仕様です。
    OpenAPI を API 仕様の正本として管理し、Swagger UI、モックサーバー、
    openapi-generator に利用します。

    ## 設計方針

    - REST を基本とし、JSON を利用します。
    - 外部公開パスは `/api/v1` を先頭に付与します。
    - リソース名は英小文字の複数形を基本とし、末尾スラッシュは付与しません。
    - JSON キーは `camelCase` とします。
    - 日時はタイムゾーンオフセット付き ISO 8601 形式の文字列で扱います。
    - 注文の外部公開識別子は `orderCode` とし、`ORD` + 6桁の連番で表現します。

    ## エラーレスポンス方針

    エラー時は共通の `ErrorResponse` を返します。
    バリデーションエラーがある場合は `validationErrors` にフィールド単位の `ValidationError` を返し、
    該当する明細がない場合は空配列を返します。

tags:
  - name: Orders
    description: 注文 API

servers:
  - url: http://localhost:8080
    description: local application server
  - url: http://localhost:4010
    description: local mock server
  - url: https://example.github.io/phone-order-api/mock
    description: published mock server example

paths:
  /api/v1/orders:
    get:
      tags:
        - Orders
      summary: 注文一覧を取得する
      description: 登録済みの注文一覧を取得します。
      operationId: getOrders
      responses:
        '200':
          description: 注文一覧取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
              example:
                - orderCode: ORD000001
                  orderedAt: '2026-04-07T10:15:30+09:00'
                  orderStatus: '001'
                - orderCode: ORD000002
                  orderedAt: '2026-04-07T11:00:00+09:00'
                  orderStatus: '002'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Orders
      summary: 注文を登録する
      description: 注文日時を指定して注文を登録します。作成された注文は受付状態で返却します。
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          description: 注文登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                orderCode: ORD000001
                orderedAt: '2026-04-07T10:15:30+09:00'
                orderStatus: '001'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/orders/{orderCode}:
    get:
      tags:
        - Orders
      summary: 注文を取得する
      description: 注文コードを指定して注文を取得します。
      operationId: getOrderByOrderCode
      parameters:
        - $ref: '#/components/parameters/OrderCode'
      responses:
        '200':
          description: 注文取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                orderCode: ORD000001
                orderedAt: '2026-04-07T10:15:30+09:00'
                orderStatus: '001'
        '400':
          $ref: '#/components/responses/InvalidOrderCodeError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    OrderCode:
      name: orderCode
      in: path
      required: true
      description: 注文コード。`ORD` + 6桁の連番。
      schema:
        type: string
        pattern: '^ORD\d{6}$'
        minLength: 9
        maxLength: 9
        example: ORD000001

  responses:
    BadRequestError:
      description: |
        リクエスト形式不正または入力値不正。
        JSON 形式不正の場合は message に `リクエストボディの形式が不正です。` を返し、
        validationErrors は空配列を返します。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-04-07T10:15:30+09:00'
            status: 400
            error: BAD_REQUEST
            message: 入力値が不正です。
            path: /api/v1/orders
            validationErrors:
              - field: orderedAt
                message: 必須項目です。
    InvalidOrderCodeError:
      description: 注文コード形式不正
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-04-07T10:15:30+09:00'
            status: 400
            error: BAD_REQUEST
            message: 入力値が不正です。
            path: /api/v1/orders/INVALID
            validationErrors:
              - field: getOrderByOrderCode.orderCode
                message: must match "^ORD\d{6}$"
    NotFoundError:
      description: 指定された注文が存在しない
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-04-07T10:15:30+09:00'
            status: 404
            error: NOT_FOUND
            message: 注文が見つかりません。
            path: /api/v1/orders/ORD999999
            validationErrors: [ ]
    InternalServerError:
      description: 想定外エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: '2026-04-07T10:15:30+09:00'
            status: 500
            error: INTERNAL_SERVER_ERROR
            message: サーバー内部でエラーが発生しました。
            path: /api/v1/orders
            validationErrors: [ ]

  schemas:
    OrderRequest:
      type: object
      description: 注文登録リクエスト。
      required:
        - orderedAt
      properties:
        orderedAt:
          type: string
          format: date-time
          description: 注文日時。タイムゾーンオフセット付き ISO 8601 形式。
          example: '2026-04-07T10:15:30+09:00'

    OrderResponse:
      type: object
      description: 注文レスポンス。
      required:
        - orderCode
        - orderedAt
        - orderStatus
      properties:
        orderCode:
          type: string
          description: 注文コード。`ORD` + 6桁の連番。
          pattern: '^ORD\d{6}$'
          example: ORD000001
        orderedAt:
          type: string
          format: date-time
          description: 注文日時。タイムゾーンオフセット付き ISO 8601 形式。
          example: '2026-04-07T10:15:30+09:00'
        orderStatus:
          type: string
          description: |
            注文ステータスコード。

            - `001`: 受付
            - `002`: 審査中
            - `003`: 手配中
            - `004`: 出荷待ち
            - `005`: 完了
            - `006`: キャンセル
          enum:
            - '001'
            - '002'
            - '003'
            - '004'
            - '005'
            - '006'
          example: '001'

    ErrorResponse:
      type: object
      description: 共通エラーレスポンス。
      required:
        - timestamp
        - status
        - error
        - message
        - path
        - validationErrors
      properties:
        timestamp:
          type: string
          format: date-time
          description: エラー発生日時。
          example: '2026-04-07T10:15:30+09:00'
        status:
          type: integer
          format: int32
          description: HTTP ステータスコード。
          example: 404
        error:
          type: string
          description: HTTP ステータス名。
          enum:
            - BAD_REQUEST
            - NOT_FOUND
            - INTERNAL_SERVER_ERROR
          example: NOT_FOUND
        message:
          type: string
          description: 利用者向けメッセージ。
          example: 注文が見つかりません。
        path:
          type: string
          description: リクエストパス。
          example: /api/v1/orders/ORD999999
        validationErrors:
          type: array
          description: バリデーションエラー一覧。該当なしの場合は空配列。
          items:
            $ref: '#/components/schemas/ValidationError'
          example: [ ]

    ValidationError:
      type: object
      description: フィールド単位のバリデーションエラー。
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: エラー対象項目。
          example: orderedAt
        message:
          type: string
          description: エラー内容。
          example: 必須項目です。
