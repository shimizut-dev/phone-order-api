openapi: 3.0.3
info:
  title: phone-order-api
  version: 0.1.0
  description: |
    移動機注文API（phone-order-api）の実装済み範囲向けAPI仕様。
    本仕様では以下を対象とする。
    - 注文一覧取得
    - 注文コードによる注文取得
    - 注文登録
servers:
  - url: http://localhost:8080
    description: local

tags:
  - name: Orders
    description: 注文API

paths:
  /api/v1/orders:
    get:
      tags:
        - Orders
      summary: 注文一覧を取得する
      operationId: getOrders
      responses:
        '200':
          description: 注文一覧取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
    post:
      tags:
        - Orders
      summary: 注文を登録する
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          description: 注文登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/orders/{orderCode}:
    get:
      tags:
        - Orders
      summary: 注文コードで注文を取得する
      operationId: getOrderByOrderCode
      parameters:
        - $ref: '#/components/parameters/OrderCode'
      responses:
        '200':
          description: 注文取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: 注文が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    OrderCode:
      name: orderCode
      in: path
      required: true
      description: 注文コード
      schema:
        type: string
        example: ORD000001

  schemas:
    OrderRequest:
      type: object
      required:
        - orderedAt
      properties:
        orderedAt:
          type: string
          format: date-time
          example: 2026-03-31T10:00:00+09:00

    OrderResponse:
      type: object
      properties:
        orderCode:
          type: string
          example: ORD000001
        orderedAt:
          type: string
          format: date-time
          example: 2026-03-31T10:00:00+09:00
        orderStatus:
          type: string
          example: '001'

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: 2026-03-31T10:00:00+09:00
        status:
          type: integer
          example: 404
        error:
          type: string
          example: Not Found
        message:
          type: string
          example: 注文が見つかりません。
        path:
          type: string
          example: /api/v1/orders/ORD000001
        validationErrors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'

    ValidationError:
      type: object
      properties:
        field:
          type: string
          example: orderedAt
        message:
          type: string
          example: 注文日時は必須です。
